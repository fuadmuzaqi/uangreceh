<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uang Receh</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-[#F8F9FD] text-slate-900 font-sans antialiased">

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mb-6 shadow-2xl shadow-indigo-200">
            <span class="text-3xl">💰</span>
        </div>
        <h1 class="text-3xl font-bold mb-2">Uang Receh</h1>
        <p class="text-slate-400 mb-8">Catatan Keuangan Fuad & Laili</p>
        <div class="w-full max-w-xs">
            <input type="password" id="access-code" placeholder="Kode Akses" class="w-full bg-slate-100 rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-center tracking-widest">
            <button onclick="checkAuth()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">Masuk</button>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-md mx-auto min-h-screen pb-24">
        <header class="p-6 pt-10">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-slate-400 text-sm font-medium">Total Saldo</h2>
                    <h3 id="total-balance" class="text-3xl font-bold text-slate-900 tracking-tight">Rp 0</h3>
                </div>
                <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-xl">✨</div>
            </div>
            
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 mb-6">
                <canvas id="financeChart" class="max-h-48"></canvas>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-emerald-50 p-5 rounded-[1.5rem] border border-emerald-100">
                    <p class="text-emerald-600 text-xs font-bold uppercase mb-1">Masuk</p>
                    <p id="total-income" class="text-lg font-bold text-emerald-700">Rp 0</p>
                </div>
                <div class="bg-rose-50 p-5 rounded-[1.5rem] border border-rose-100">
                    <p class="text-rose-600 text-xs font-bold uppercase mb-1">Keluar</p>
                    <p id="total-expense" class="text-lg font-bold text-rose-700">Rp 0</p>
                </div>
            </div>
        </header>

        <section class="px-6 mt-2">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold text-lg">Riwayat</h4>
                <select id="month-filter" class="text-sm font-semibold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full outline-none">
                    <option>Semua Waktu</option>
                </select>
            </div>
            <div id="transaction-list" class="space-y-4">
                </div>
        </section>

        <button onclick="toggleModal()" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2 active:scale-95 transition-all z-40">
            <span class="text-xl">+</span> Tambah
        </button>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-50 flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-8 animate-slide-up shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            <div class="space-y-5">
                <div class="flex bg-slate-100 rounded-2xl p-1.5">
                    <button id="btn-in" onclick="setType('Pemasukan')" class="flex-1 py-3 rounded-xl font-bold transition-all bg-white shadow-sm text-emerald-600">Pemasukan</button>
                    <button id="btn-out" onclick="setType('Pengeluaran')" class="flex-1 py-3 rounded-xl font-bold transition-all text-slate-500">Pengeluaran</button>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-2">Nominal</label>
                    <input type="number" id="input-amount" placeholder="0" class="w-full bg-transparent border-b-2 border-slate-100 py-4 text-4xl font-bold outline-none focus:border-indigo-500 transition-colors">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-2">Siapa?</label>
                        <select id="input-person" class="w-full bg-slate-50 rounded-xl p-4 outline-none border-none mt-1">
                            <option value="Fuad">Fuad</option>
                            <option value="Laili">Laili</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-2">Keterangan</label>
                        <input type="text" id="input-note" placeholder="Makan siang..." class="w-full bg-slate-50 rounded-xl p-4 outline-none border-none mt-1">
                    </div>
                </div>

                <button onclick="saveData()" id="btn-save" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 mt-4">Simpan</button>
                <button onclick="toggleModal()" class="w-full text-slate-400 font-medium py-2">Tutup</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
