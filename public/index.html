<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uang Receh</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            overflow-x: hidden;
        }
        /* Efek Glassmorphism */
        .glass { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        /* Teks Gradasi */
        .gradient-text { 
            background: linear-gradient(to right, #818cf8, #c084fc); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        /* Sembunyikan Scrollbar */
        ::-webkit-scrollbar { display: none; }
        
        /* Animasi Slide Up */
        .animate-slide-up { 
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }

        /* Styling Titik Besar Placeholder PIN */
        #access-code::placeholder { 
            font-size: 26px; 
            color: #475569; 
            letter-spacing: 0.1em;
            vertical-align: middle;
        }
    </style>
</head>
<body class="antialiased">

    <div id="login-screen" class="fixed inset-0 bg-[#0f172a] z-[100] flex flex-col items-center justify-center p-8">
        <div class="w-24 h-24 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-[2.5rem] flex items-center justify-center mb-8 shadow-[0_0_50px_rgba(79,70,229,0.3)] text-4xl">
            💰
        </div>
        <h1 class="text-4xl font-extrabold mb-12 tracking-tight gradient-text text-center">Uang Receh</h1>
        <div class="w-full max-w-xs space-y-5">
            <input type="password" id="access-code" placeholder="●●●●" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-5 outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold tracking-[1em] text-white transition-all">
            <button onclick="checkAuth()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white p-5 rounded-2xl font-black text-xs tracking-[0.3em] active:scale-95 transition-all shadow-lg uppercase">
                Buka
            </button>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-md mx-auto min-h-screen pb-32">
        
        <header class="p-6 pt-8 sticky top-0 bg-[#0f172a]/80 backdrop-blur-xl z-30 flex justify-between items-center">
            <div class="relative">
                <select id="month-filter" class="appearance-none bg-slate-800 text-indigo-400 pl-4 pr-10 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-wider outline-none border border-slate-700 shadow-xl">
                    </select>
                <div class="absolute right-3 top-3 pointer-events-none text-indigo-400">
                    <svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/>
                    </svg>
                </div>
            </div>
            <button onclick="logout()" class="p-3 bg-slate-800/50 text-rose-400 rounded-2xl border border-slate-700 active:scale-90 transition-all shadow-sm">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </header>

        <div class="px-6">
            <div class="relative flex items-center justify-center mb-10 mt-4">
                <div class="absolute text-center">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] mb-1">Masuk</p>
                    <h4 id="chart-percent" class="text-3xl font-black text-white tabular-nums">0%</h4>
                </div>
                <div class="w-64 h-64">
                    <canvas id="financeChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-10">
                <div class="glass p-5 rounded-[2.2rem] relative overflow-hidden border-l-4 border-emerald-500">
                    <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-1">Pemasukan</p>
                    <p id="total-income" class="text-[15px] font-bold text-white tabular-nums">Rp 0</p>
                </div>
                <div class="glass p-5 rounded-[2.2rem] relative overflow-hidden border-l-4 border-rose-500">
                    <p class="text-[9px] font-black text-rose-500 uppercase tracking-widest mb-1">Pengeluaran</p>
                    <p id="total-expense" class="text-[15px] font-bold text-white tabular-nums">Rp 0</p>
                </div>
            </div>

            <div class="flex items-center gap-4 mb-6">
                <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] whitespace-nowrap">Riwayat Transaksi</h4>
                <div class="h-px w-full bg-slate-800/50"></div>
            </div>
            
            <div id="transaction-list" class="space-y-4">
                </div>
        </div>

        <button onclick="toggleModal()" class="fixed bottom-8 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-[0_15px_40px_rgba(79,70,229,0.5)] flex items-center justify-center active:scale-90 transition-all z-40 border border-indigo-400/20">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden z-50 flex items-end">
        <div class="bg-slate-900 w-full rounded-t-[3rem] p-8 animate-slide-up border-t border-slate-800/50 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-800 rounded-full mx-auto mb-10"></div>
            <input type="hidden" id="edit-id" value="">
            
            <div class="flex bg-slate-800/50 rounded-2xl p-1.5 mb-8 border border-slate-700/30">
                <button id="btn-in" onclick="setType('Pemasukan')" class="flex-1 py-3.5 rounded-xl font-black text-[10px] tracking-widest transition-all bg-indigo-600 text-white shadow-lg">MASUK</button>
                <button id="btn-out" onclick="setType('Pengeluaran')" class="flex-1 py-3.5 rounded-xl font-black text-[10px] tracking-widest transition-all text-slate-500">KELUAR</button>
            </div>

            <div class="space-y-8">
                <div>
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-[0.3em] ml-2">Nominal</label>
                    <input type="number" id="input-amount" placeholder="0" class="w-full bg-transparent border-b border-slate-700 py-4 text-4xl font-black outline-none focus:border-indigo-500 text-white transition-all">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase tracking-[0.3em] ml-2">Oleh</label>
                        <select id="input-person" class="w-full bg-slate-800/50 rounded-2xl p-4 outline-none font-bold text-white mt-2 border border-slate-700/50">
                            <option value="Fuad">Fuad</option>
                            <option value="Laili">Laili</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase tracking-[0.3em] ml-2">Catatan</label>
                        <input type="text" id="input-note" placeholder="..." class="w-full bg-slate-800/50 rounded-2xl p-4 outline-none font-bold text-white mt-2 border border-slate-700/50">
                    </div>
                </div>

                <button onclick="saveData()" id="btn-save" class="w-full bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black text-xs tracking-[0.2em] shadow-xl mt-4 active:scale-95 transition-all uppercase">
                    Simpan Data
                </button>
                <button onclick="closeModal()" class="w-full text-slate-600 font-bold py-2 text-[9px] tracking-[0.3em] uppercase mt-2">
                    Batal
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
