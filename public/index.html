<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uang Receh</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8F9FD] text-slate-900 font-sans antialiased">

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8">
        <div class="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center mb-6 shadow-xl shadow-indigo-100 text-3xl">💰</div>
        <h1 class="text-3xl font-bold mb-2">Uang Receh</h1>
        <p class="text-slate-400 mb-8 text-center text-sm">Catatan Keuangan Fuad & Laili</p>
        <div class="w-full max-w-xs">
            <input type="password" id="access-code" placeholder="Kode Akses" class="w-full bg-slate-100 rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold tracking-widest transition-all">
            <button onclick="checkAuth()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-indigo-100">Masuk</button>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-md mx-auto min-h-screen pb-28">
        <header class="p-6 pt-10 sticky top-0 bg-[#F8F9FD]/90 backdrop-blur-md z-30">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Saldo Tersisa</h2>
                    <h3 id="total-balance" class="text-3xl font-bold text-slate-900 tracking-tight mt-1">Rp 0</h3>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <button onclick="logout()" class="text-rose-500 bg-rose-50 px-3 py-1.5 rounded-xl text-[10px] font-bold active:scale-95 transition-all flex items-center gap-1">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        LOGOUT
                    </button>
                    <select id="month-filter" class="text-[10px] font-bold text-indigo-600 bg-white px-3 py-2 rounded-xl shadow-sm border-none ring-1 ring-slate-100 outline-none"></select>
                </div>
            </div>
            
            <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-50 mb-6 h-52 flex items-center justify-center">
                <canvas id="financeChart"></canvas>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-emerald-500 p-5 rounded-3xl text-white shadow-lg shadow-emerald-100">
                    <p class="text-[9px] font-bold uppercase opacity-80 mb-1">Pemasukan</p>
                    <p id="total-income" class="text-lg font-bold">Rp 0</p>
                </div>
                <div class="bg-rose-500 p-5 rounded-3xl text-white shadow-lg shadow-rose-100">
                    <p class="text-[9px] font-bold uppercase opacity-80 mb-1">Pengeluaran</p>
                    <p id="total-expense" class="text-lg font-bold">Rp 0</p>
                </div>
            </div>
        </header>

        <section class="px-6 mt-4">
            <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2 text-sm">
                <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span> Riwayat Transaksi
            </h4>
            <div id="transaction-list" class="space-y-3"></div>
        </section>

        <button onclick="toggleModal()" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl font-bold active:scale-95 transition-all z-40 flex items-center gap-2">
            <span class="text-xl">+</span> Tambah Data
        </button>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-50 flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-8 animate-slide-up shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <input type="hidden" id="edit-id" value="">
            
            <div class="flex bg-slate-100 rounded-2xl p-1.5 mb-6">
                <button id="btn-in" onclick="setType('Pemasukan')" class="flex-1 py-3 rounded-xl font-bold transition-all bg-white shadow-sm text-emerald-600">Pemasukan</button>
                <button id="btn-out" onclick="setType('Pengeluaran')" class="flex-1 py-3 rounded-xl font-bold transition-all text-slate-500">Pengeluaran</button>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Nominal (Rp)</label>
                    <input type="number" id="input-amount" placeholder="0" class="w-full bg-transparent border-b-2 border-slate-100 py-2 text-3xl font-bold outline-none focus:border-indigo-500 transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Oleh</label>
                        <select id="input-person" class="w-full bg-slate-50 rounded-xl p-4 outline-none font-bold text-slate-700 mt-1 border-none">
                            <option value="Fuad">Fuad</option>
                            <option value="Laili">Laili</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Keterangan</label>
                        <input type="text" id="input-note" placeholder="Makan..." class="w-full bg-slate-50 rounded-xl p-4 outline-none font-bold mt-1 border-none">
                    </div>
                </div>

                <button onclick="saveData()" id="btn-save" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg mt-4 shadow-lg shadow-indigo-100">Simpan</button>
                <button onclick="closeModal()" class="w-full text-slate-400 font-bold py-2 text-xs tracking-widest uppercase">Batal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
