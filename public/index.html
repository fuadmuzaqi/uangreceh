<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuadEli Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6">
        <h1 class="text-2xl font-bold mb-6 text-indigo-600">FuadEli Finance</h1>
        <input type="password" id="access-code" placeholder="Masukkan Kode Akses" class="border-2 border-gray-200 rounded-lg p-3 w-full max-w-xs mb-4 focus:border-indigo-500 outline-none">
        <button onclick="checkAuth()" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-semibold shadow-lg">Masuk</button>
    </div>

    <div id="main-content" class="hidden max-w-md mx-auto pb-24">
        <header class="p-6 bg-white shadow-sm sticky top-0 z-10">
            <h2 class="text-xl font-bold text-gray-700">Ringkasan Bulan Ini</h2>
            <div class="mt-4 bg-indigo-600 rounded-2xl p-6 text-white shadow-xl">
                <p class="text-sm opacity-80">Total Saldo</p>
                <h3 id="total-balance" class="text-3xl font-bold mt-1">Rp 0</h3>
            </div>
        </header>

        <section class="p-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6">
                <canvas id="financeChart" class="max-h-64"></canvas>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-green-100 p-4 rounded-xl">
                    <p class="text-xs text-green-600 font-bold uppercase">Pemasukan</p>
                    <p id="total-income" class="text-lg font-bold text-green-700">Rp 0</p>
                </div>
                <div class="bg-red-100 p-4 rounded-xl">
                    <p class="text-xs text-red-600 font-bold uppercase">Pengeluaran</p>
                    <p id="total-expense" class="text-lg font-bold text-red-700">Rp 0</p>
                </div>
            </div>
        </section>

        <section class="px-6">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold">Rincian Transaksi</h4>
                <select id="month-filter" class="text-sm bg-transparent border-none outline-none text-indigo-600 font-semibold">
                    </select>
            </div>
            <div id="transaction-list" class="space-y-3">
                </div>
        </section>

        <button onclick="toggleModal()" class="fixed bottom-6 right-6 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-2xl text-3xl">+</button>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-8 transform transition-transform animate-slide-up">
            <h3 class="text-xl font-bold mb-4 text-center">Tambah Catatan</h3>
            <div class="space-y-4">
                <div class="flex bg-gray-100 rounded-lg p-1">
                    <button id="btn-in" onclick="setType('Pemasukan')" class="flex-1 py-2 rounded-md font-bold transition bg-white shadow text-green-600">Pemasukan</button>
                    <button id="btn-out" onclick="setType('Pengeluaran')" class="flex-1 py-2 rounded-md font-bold transition text-gray-500">Pengeluaran</button>
                </div>
                <input type="number" id="input-amount" placeholder="Nominal (Rp)" class="w-full border-b-2 border-gray-100 py-3 text-2xl font-bold outline-none focus:border-indigo-500">
                <select id="input-person" class="w-full border-b-2 border-gray-100 py-3 outline-none">
                    <option value="Fuad">Fuad</option>
                    <option value="Laili">Laili</option>
                </select>
                <input type="text" id="input-note" placeholder="Keterangan (Contoh: Beli Token Listrik)" class="w-full border-b-2 border-gray-100 py-3 outline-none">
                <button onclick="saveData()" id="btn-save" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg">Simpan Transaksi</button>
                <button onclick="toggleModal()" class="w-full text-gray-400 py-2">Batal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
