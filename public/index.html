<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uang Receh</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-[#F8F9FD] text-slate-900 font-sans antialiased">

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mb-6 shadow-2xl shadow-indigo-100 text-3xl">💰</div>
        <h1 class="text-3xl font-bold mb-2">Uang Receh</h1>
        <p class="text-slate-400 mb-8 text-center">Catatan Keuangan Fuad & Laili</p>
        <div class="w-full max-w-xs">
            <input type="password" id="access-code" placeholder="Kode Akses" class="w-full bg-slate-100 rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-center tracking-widest font-bold">
            <button onclick="checkAuth()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 active:scale-95 transition-all">Masuk</button>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-md mx-auto min-h-screen pb-28">
        <header class="p-6 pt-10 sticky top-0 bg-[#F8F9FD]/80 backdrop-blur-md z-30">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-slate-400 text-xs font-bold uppercase tracking-wider">Saldo Tersisa</h2>
                    <h3 id="total-balance" class="text-3xl font-bold text-slate-900 tracking-tight mt-1">Rp 0</h3>
                </div>
                <div class="text-right">
                    <select id="month-filter" class="text-sm font-bold text-indigo-600 bg-white px-4 py-2 rounded-2xl shadow-sm border-none outline-none ring-1 ring-slate-100"></select>
                </div>
            </div>
            
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-50 mb-6 flex items-center justify-center h-52">
                <canvas id="financeChart"></canvas>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-emerald-500 p-5 rounded-[1.5rem] text-white shadow-lg shadow-emerald-100">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Pemasukan</p>
                    <p id="total-income" class="text-lg font-bold">Rp 0</p>
                </div>
                <div class="bg-rose-500 p-5 rounded-[1.5rem] text-white shadow-lg shadow-rose-100">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Pengeluaran</p>
                    <p id="total-expense" class="text-lg font-bold">Rp 0</p>
                </div>
            </div>
        </header>

        <section class="px-6 mt-4">
            <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span> Rincian Transaksi
            </h4>
            <div id="transaction-list" class="space-y-3"></div>
        </section>

        <button onclick="toggleModal()" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2 active:scale-95 transition-all z-40">
            <span class="text-xl">+</span> Tambah Data
        </button>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-50 flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-8 animate-slide-up shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <div class="space-y-5">
                <input type="hidden" id="edit-id" value="">
                <div class="flex bg-slate-100 rounded-2xl p-1.5">
                    <button id="btn-in" onclick="setType('Pemasukan')" class="flex-1 py-3 rounded-xl font-bold transition-all bg-white shadow-sm text-emerald-600">Pemasukan</button>
                    <button id="btn-out" onclick="setType('Pengeluaran')" class="flex-1 py-3 rounded-xl font-bold transition-all text-slate-500">Pengeluaran</button>
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Nominal Angka</label>
                    <input type="number" id="input-amount" placeholder="0" class="w-full bg-transparent border-b-2 border-slate-100 py-3 text-4xl font-bold outline-none focus:border-indigo-500 transition-colors">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Oleh</label>
                        <select id="input-person" class="w-full bg-slate-50 rounded-xl p-4 outline-none border-none mt-1 font-semibold text-slate-700">
                            <option value="Fuad">Fuad</option>
                            <option value="Laili">Laili</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Keterangan</label>
                        <input type="text" id="input-note" placeholder="Beli bakso..." class="w-full bg-slate-50 rounded-xl p-4 outline-none border-none mt-1 font-semibold">
                    </div>
                </div>

                <button onclick="saveData()" id="btn-save" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 mt-4">Simpan</button>
                <button onclick="closeModal()" class="w-full text-slate-400 font-medium py-2">Batal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
