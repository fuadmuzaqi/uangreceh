<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="180" y1="140" x2="860" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(390 300) rotate(50) scale(520 520)">
      <stop offset="0%" stop-color="#9F7AEA" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9F7AEA" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bagGrad" x1="512" y1="355" x2="512" y2="690" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD978"/>
      <stop offset="55%" stop-color="#F6B54A"/>
      <stop offset="100%" stop-color="#D98A22"/>
    </linearGradient>

    <radialGradient id="bagHighlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(468 430) rotate(45) scale(120 90)">
      <stop offset="0%" stop-color="#FFF4BF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFF4BF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="tieGrad" x1="512" y1="335" x2="512" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B86A18"/>
      <stop offset="100%" stop-color="#8D4C0F"/>
    </linearGradient>

    <linearGradient id="coinTop" x1="512" y1="235" x2="512" y2="315" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE08A"/>
      <stop offset="100%" stop-color="#E5A93B"/>
    </linearGradient>

    <filter id="shadow" x="180" y="180" width="664" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#2A0D66" flood-opacity="0.28"/>
    </filter>

    <filter id="softShadow" x="250" y="230" width="524" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#6B3F00" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="96" y="96" width="832" height="832" rx="220" fill="url(#bgGrad)"/>
  <rect x="96" y="96" width="832" height="832" rx="220" fill="url(#bgGlow)"/>
  <rect x="112" y="112" width="800" height="800" rx="204" stroke="rgba(255,255,255,0.10)" stroke-width="8"/>

  <!-- Money bag -->
  <g filter="url(#shadow)">
    <!-- Top crown -->
    <path d="M478 255C488 247 494 237 496 226C506 235 514 240 524 242C536 236 543 230 548 220C553 232 560 242 571 251C557 261 543 266 527 267H495C489 267 483 263 478 255Z"
      fill="url(#coinTop)"/>

    <!-- Neck -->
    <path d="M454 330C454 305 477 286 512 286C547 286 570 305 570 330C570 345 562 357 549 367H475C462 357 454 345 454 330Z"
      fill="url(#coinTop)"/>

    <!-- Tie -->
    <g filter="url(#softShadow)">
      <path d="M456 365C490 381 534 381 568 365C566 386 553 404 512 404C471 404 458 386 456 365Z" fill="url(#tieGrad)"/>
      <ellipse cx="512" cy="365" rx="58" ry="18" fill="#C67B23"/>
      <ellipse cx="512" cy="362" rx="42" ry="10" fill="#E0A14C" opacity="0.65"/>
    </g>

    <!-- Bag body -->
    <path d="M512 392C627 392 706 468 706 580C706 686 625 756 512 756C399 756 318 686 318 580C318 468 397 392 512 392Z"
      fill="url(#bagGrad)"/>

    <!-- Highlight -->
    <ellipse cx="462" cy="470" rx="88" ry="70" fill="url(#bagHighlight)"/>

    <!-- Lower shading -->
    <ellipse cx="540" cy="675" rx="150" ry="58" fill="#AD5E13" opacity="0.16"/>

    <!-- Dollar sign circle -->
    <circle cx="512" cy="566" r="92" fill="none" stroke="#B36A1F" stroke-width="10" opacity="0.55"/>
    <path d="M525 500V520M525 612V632M564 530C564 508 543 494 520 494C496 494 479 508 479 527C479 549 500 559 525 566C550 573 571 583 571 605C571 624 552 640 526 640C501 640 480 626 480 603M525 566C502 559 479 549 479 527M525 566C549 573 571 583 571 605"
      stroke="#8C4E13" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
